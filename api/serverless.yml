# 서비스 이름 (Serverless Framework 프로젝트 단위)
service: share-it-api

plugins:
  - serverless-offline  # 로컬 실행용 플러그인 (API Gateway + Lambda 에뮬레이션)

custom:
  serverless-offline:
    httpPort: 3001        # 로컬 HTTP 포트 (기본값 3000)
    lambdaPort: 3002      # 로컬 Lambda 포트
    noPrependStageInUrl: true  # URL 에 스테이지 접두사 제거 (/api/v1/topics 형태 유지)

provider:
  name: aws           # 클라우드 공급자: AWS
  runtime: nodejs20.x # Lambda 런타임
  region: us-west-2   # 배포 리전: 미국 서부 (오리건)
  stage: ${opt:stage, 'dev'} # 배포 스테이지: --stage 옵션으로 지정, 기본값 dev (dev / prod / test)
  environment:
    STAGE: ${self:provider.stage}                      # Lambda 환경변수: 현재 스테이지
    TOPICS_TABLE: t_topics-${self:provider.stage}      # Lambda 환경변수: DynamoDB 테이블명 (스테이지별 분리)
    SUBSCRIPTIONS_TABLE: t_subscriptions-${self:provider.stage} # 구독 테이블명 (스테이지별 분리)
    EVENTS_TABLE: t_events-${self:provider.stage}
    AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'           # HTTP Keep-Alive 활성화 (성능 최적화)
    DYNAMODB_ENDPOINT: ${env:DYNAMODB_ENDPOINT, ''}    # 로컬 DynamoDB 엔드포인트 (로컬 실행 시 http://localhost:8000)
  iam:
    role:
      statements:
        - Effect: Allow          # DynamoDB 접근 허용
          Action:
            - dynamodb:PutItem   # 아이템 생성 (POST /topics)
            - dynamodb:GetItem   # 아이템 단건 조회
            - dynamodb:Query     # 인덱스 기반 조회 (GET /topics/owned)
            - dynamodb:UpdateItem
          Resource:
              - !GetAtt TopicsTable.Arn          # 기본 테이블 ARN
              - !Sub '${TopicsTable.Arn}/index/*' # GSI 포함 모든 인덱스 ARN
              - !GetAtt SubscriptionsTable.Arn
              - !GetAtt EventsTable.Arn
              - !Sub '${EventsTable.Arn}/index/*'

functions:
  createTopic:                                   # 토픽 생성 Lambda 함수
    handler: src/handlers/topics.createTopic     # 핸들러 파일 경로
    events:
      - httpApi:
          path: /api/v1/topics   # POST /api/v1/topics
          method: post

  getOwnedTopics:                                    # 내 토픽 목록 조회 Lambda 함수
    handler: src/handlers/topics.getOwnedTopics      # 핸들러 파일 경로
    events:
      - httpApi:
          path: /api/v1/topics/owned   # GET /api/v1/topics/owned
          method: get

  updateTopic:
    handler: src/handlers/topics.updateTopic
    events:
      - httpApi:
          path: /api/v1/topics/{topic_id}
          method: patch

  deleteTopic:
    handler: src/handlers/topics.deleteTopic
    events:
      - httpApi:
          path: /api/v1/topics/{topic_id}
          method: delete

  setDefaultTopic:
    handler: src/handlers/topics.setDefaultTopic
    events:
      - httpApi:
          path: /api/v1/topics/{topic_id}/default
          method: post

  subscribeTopic:
    handler: src/handlers/topics.subscribeTopic
    events:
      - httpApi:
          path: /api/v1/topics/{topic_id}/subscribe
          method: post

  createEvent:
    handler: src/handlers/events.createEvent
    events:
      - httpApi:
          path: /api/v1/topics/{topic_id}/events
          method: post

  getTopicEvents:
    handler: src/handlers/events.getTopicEvents
    events:
      - httpApi:
          path: /api/v1/topics/{topic_id}/events
          method: get

  updateEvent:
    handler: src/handlers/events.updateEvent
    events:
      - httpApi:
          path: /api/v1/topics/{topic_id}/events/{event_id}
          method: patch

  deleteEvent:
    handler: src/handlers/events.deleteEvent
    events:
      - httpApi:
          path: /api/v1/topics/{topic_id}/events/{event_id}
          method: delete

resources:
  Resources:
    TopicsTable:                          # DynamoDB 테이블 리소스 정의
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: t_topics-${self:provider.stage} # 스테이지별 테이블 이름 (예: t_topics-dev)
        BillingMode: PAY_PER_REQUEST               # 온디맨드 과금 방식
        AttributeDefinitions:
          - AttributeName: PK    # PK 속성
            AttributeType: S
          - AttributeName: SK    # GSI PK 속성
            AttributeType: S
          - AttributeName: GSI1PK  # GSI PK 속성
            AttributeType: S
          - AttributeName: GSI1SK  # GSI 정렬 키 속성
            AttributeType: S
        KeySchema:
          - AttributeName: PK    # 기본 키 (PK)
            KeyType: HASH
          - AttributeName: SK    # 정렬 키 (SK)
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: owner-index     # 소유자별 조회용 GSI
            KeySchema:
              - AttributeName: GSI1PK    # GSI PK: 소유자 ID
                KeyType: HASH
              - AttributeName: GSI1SK  # GSI 정렬 키: 생성일시
                KeyType: RANGE
            Projection:
              ProjectionType: ALL          # 모든 속성 포함
    SubscriptionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: t_subscriptions-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: GSI1PK
            AttributeType: S
          - AttributeName: GSI1SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH # 이 속성은 파티션 키(Primary Key)다
          - AttributeName: SK
            KeyType: RANGE # 이 속성은 정렬 키 (Sort Key)다
        GlobalSecondaryIndexes:
          - IndexName: user-index
            KeySchema:
              - AttributeName: GSI1PK
                KeyType: HASH
              - AttributeName: GSI1SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL # "이 인덱스에서 테이블의 모든 컬럼을 조회할 수 있게 해줘"라는 뜻입니다.보통 인덱스만으로 모든 데이터를 빠르게 읽고 싶을 때 사용합니다.
    EventsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: t_events-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: GSI1PK
            AttributeType: S
          - AttributeName: GSI1SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: topic-index
            KeySchema:
              - AttributeName: GSI1PK
                KeyType: HASH
              - AttributeName: GSI1SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL # "이 인덱스에서 테이블의 모든 컬럼을 조회할 수 있게 해줘"라는 뜻입니다. 보통 인덱스만으로 모든 데이터를 빠르게 읽고 싶을 때 사용합니다.

inherit_gem:
  rubocop-rails-omakase: rubocop.yml

Metrics/MethodLength:
  Max: 30

Metrics/ClassLength:
  Max: 200

Metrics/BlockLength:
  Max: 50
  Exclude:
    - 'spec/**/*'
    - 'app/api/**/*'

Metrics/AbcSize:
  Enabled: false

Style/TrailingCommaInArguments:
  EnforcedStyleForMultiline: comma

Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: comma

Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: comma

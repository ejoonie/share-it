services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD environment variable must be set}
      POSTGRES_DB: sp_api_production
    volumes:
      - pgdata:/var/lib/postgresql/data

  sp-api:
    container_name: sp-api
    image: ruby:3.3
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      RAILS_ENV: production
      RAILS_MAX_THREADS: "1"
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD environment variable must be set}@db:5432/sp_api_production
    command: bash -lc "bundle check || bundle install && bin/rails db:prepare && bundle exec puma -C config/puma.rb"
    depends_on:
      - db

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - sp-api

volumes:
  pgdata:

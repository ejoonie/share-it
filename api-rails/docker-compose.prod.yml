services:
  db:
    image: postgres:16
    env_file: .env.prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: sp_api_production
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  sp-api:
    container_name: sp-api
    image: ghcr.io/ejoonie/share-it-api:latest
    env_file: .env.prod
    environment:
      RAILS_ENV: production
    depends_on:
      - db
    restart: always

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - sp-api

volumes:
  pgdata:

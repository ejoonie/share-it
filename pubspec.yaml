name: share_it
description: A household budget and expense tracking app.
version: 1.0.0+3

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Local storage
  shared_preferences: ^2.2.3

  # Networking
  http: ^1.2.0

  # UI
  table_calendar: ^3.0.9
  intl: ^0.18.1

  # Icons
  cupertino_icons: ^1.0.6
  qr_flutter: ^4.1.0
  share_plus: ^13.2.0
  app_links: ^7.2.0
  mobile_scanner: ^7.2.0
  package_info_plus: ^10.2.0
  permission_handler: ^12.0.3
  app_settings: ^8.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/playstore.png
  android: true
  ios: true
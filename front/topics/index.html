<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sharable Piggy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 15px;
      color: #666;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      margin-bottom: 12px;
      transition: opacity 0.15s;
    }

    .btn:active { opacity: 0.8; }

    .btn-primary {
      background: #FF6B35;
      color: #fff;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .divider {
      color: #bbb;
      font-size: 13px;
      margin: 8px 0 20px;
    }

    .token-label {
      font-size: 12px;
      color: #bbb;
      margin-top: 24px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🐷</div>
    <h1 id="title">토픽 구독 초대</h1>
    <p class="subtitle" id="subtitle">
      누군가 Sharable Piggy 토픽을 공유했어요.<br>
      앱에서 구독하면 함께 관리할 수 있어요.
    </p>

    <button class="btn btn-primary" id="openAppBtn">앱에서 열기</button>

    <div class="divider">앱이 없다면</div>

    <a class="btn btn-secondary" id="storeBtn" href="#">앱 다운로드</a>

    <p class="token-label" id="tokenLabel"></p>
  </div>

  <script>
    // 프로덕션: /topics/{token} 경로에서 추출
    // 로컬 테스트: ?token=xxx 쿼리 파라미터 지원
    const params = new URLSearchParams(location.search);
    const pathToken = location.pathname.split('/').filter(Boolean).pop();
    const token = params.get('token') || (pathToken !== 'index.html' ? pathToken : 'unknown');
    const deepLink = `sharablepiggy://topics/${token}`;

    // iOS App Store / Android Play Store 링크 — 추후 실제 링크로 교체
    const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
    const isAndroid = /Android/.test(navigator.userAgent);

    const storeLink = isIOS
      ? 'https://apps.apple.com/app/idXXXXXXXXX'   // TODO: 실제 App Store ID
      : 'https://play.google.com/store/apps/details?id=com.example.share_it'; // TODO: 실제 앱 ID

    document.getElementById('storeBtn').href = storeLink;
    document.getElementById('tokenLabel').textContent = `token: ${token}`;

    document.getElementById('openAppBtn').addEventListener('click', () => {
      // Universal Link / App Link 가 설정되면 이 딥링크 대신 현재 URL 자체가 앱을 열지만
      // 폴백으로 custom scheme 시도
      window.location.href = deepLink;

      // 일정 시간 후에도 앱이 안 열리면 스토어로
      setTimeout(() => {
        window.location.href = storeLink;
      }, 2000);
    });
  </script>
</body>
</html>
